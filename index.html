<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOOK'S 회의록 v2.5 Professional</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --paper:#F7F5F0;--paper-2:#EFECE5;--paper-3:#E8E4DA;
  --ink:#2C2C2A;--ink-2:#5A5753;--ink-3:#8A8780;
  --line:#D8D4C8;--line-2:#C8C3B5;
  --red:#9B3A2A;--red-bg:#F5EDE9;
  --moss:#4A6741;--moss-bg:#EBF0E8;
  --sand:#8B7355;--sand-bg:#F2EDE3;
  --slate:#3D5A6B;--slate-bg:#E8EFF3;
  --serif:'Noto Serif KR',serif;--sans:'Noto Sans KR',sans-serif;--mono:'Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.7;}
.header{background:var(--ink);padding:0 2.5rem;height:56px;display:flex;align-items:center;gap:16px;}
.header-logo{font-family:var(--serif);font-size:15px;font-weight:600;color:var(--paper);letter-spacing:2px;}
.header-div{width:1px;height:18px;background:rgba(255,255,255,0.2);}
.header-sub{font-size:12px;color:rgba(255,255,255,0.4);font-weight:300;letter-spacing:0.5px;}
.wrap{max-width:860px;margin:0 auto;padding:3rem 2rem 4rem;}
.sec{border-bottom:1px solid var(--line);padding:2.5rem 0;}
.sec:first-child{padding-top:0;}
.sec-label{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink-3);margin-bottom:1.5rem;display:flex;align-items:center;gap:10px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--line);}
.upload-zone{border:1px dashed var(--line-2);background:white;padding:2rem;text-align:center;cursor:pointer;position:relative;}
textarea{width:100%;min-height:150px;border:1px solid var(--line);padding:1rem;font-size:13px;resize:vertical;outline:none;}
.meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;}
.field label{display:block;font-size:10px;color:var(--ink-3);margin-bottom:5px;text-transform:uppercase;}
.field input, .field select{width:100%;padding:8px;border:1px solid var(--line);outline:none;}
.options-grid{display:flex;flex-wrap:wrap;gap:8px;}
.opt-toggle{padding:6px 12px;border:1px solid var(--line);cursor:pointer;background:white;font-size:12px;}
.opt-toggle.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.api-section{background:white;border:1px solid var(--line);padding:1.5rem;}
.btn-generate{width:100%;padding:16px;background:var(--ink);color:var(--paper);border:none;font-family:var(--serif);font-size:16px;cursor:pointer;margin-top:2rem;}
.progress-wrap{display:none;margin-top:1.5rem;height:2px;background:var(--line);position:relative;}
.progress-fill{height:100%;background:var(--ink);width:0%;transition:width 0.3s;}

/* RESULT STYLES */
.result-wrap{display:none;margin-top:3rem;}
.doc{background:white;border:1px solid var(--line);box-shadow:0 10px 30px rgba(0,0,0,0.05);}
.doc-head{padding:3rem;border-bottom:2px solid var(--ink);}
.doc-title{font-family:var(--serif);font-size:24px;margin-bottom:1rem;}
.doc-meta-table{width:100%;border-collapse:collapse;font-size:12px;}
.doc-meta-table td{padding:8px 0;border-bottom:1px solid var(--paper-2);}
.doc-meta-table td:first-child{width:100px;color:var(--ink-3);text-transform:uppercase;letter-spacing:1px;}
.doc-sec{padding:2rem 3rem;border-bottom:1px solid var(--line);}
.doc-sec-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-3);margin-bottom:1.5rem;display:flex;align-items:center;}
.doc-sec-title span{font-family:var(--mono);margin-right:10px;}
.doc-sec-title::after{content:'';flex:1;height:1px;background:var(--line);margin-left:10px;}
.summary-text{font-size:14px;line-height:1.8;padding-left:1rem;border-left:3px solid var(--ink);}
.decision-box{background:var(--sand-bg);padding:1.5rem;border-left:4px solid var(--sand);margin-bottom:1rem;}
.rationale-tag{display:inline-block;font-family:var(--mono);font-size:10px;background:var(--paper-3);padding:2px 6px;margin-bottom:8px;color:var(--sand);}
.issue-item{background:var(--paper-2);padding:1rem;margin-bottom:0.5rem;font-size:13px;}
.todo-table{width:100%;border-collapse:collapse;font-size:12px;}
.todo-table th{text-align:left;padding:8px;border-bottom:1px solid var(--ink);color:var(--ink-3);}
.todo-table td{padding:10px 8px;border-bottom:1px solid var(--line);}
.owner-tag{background:var(--slate-bg);color:var(--slate);padding:2px 8px;font-size:11px;}
.doc-foot{padding:1.5rem 3rem;background:var(--paper-2);display:flex;justify-content:space-between;font-size:11px;}
.btn-doc{padding:8px 16px;border:1px solid var(--line-2);background:white;cursor:pointer;font-size:12px;}
.btn-doc.primary{background:var(--ink);color:var(--paper);border:none;}
@media print{.header, .sec, .btn-generate{display:none!important;}.doc{border:none;}}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">WOOK'S 회의록</div>
  <div class="header-div"></div>
  <div class="header-sub">Professional Analysis v2.5</div>
</div>

<div class="wrap">
  <div class="sec">
    <div class="sec-label">01. 녹취록 입력</div>
    <textarea id="transcriptText" placeholder="회의 녹취록을 붙여넣으세요..."></textarea>
  </div>

  <div class="sec">
    <div class="sec-label">02. 기본 정보</div>
    <div class="meta-grid">
      <div class="field"><label>회의명</label><input type="text" id="meetingTitle" placeholder="미입력 시 자동생성"></div>
      <div class="field"><label>참석자</label><input type="text" id="attendees" placeholder="홍길동, 김철수..."></div>
      <div class="field"><label>주관부서</label><input type="text" id="dept" placeholder="기획팀"></div>
      <div class="field"><label>날짜</label><input type="date" id="mDate"></div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-label">03. 분석 설정</div>
    <div class="options-grid" id="optionsGrid">
      <div class="opt-toggle active" data-key="background">회의 배경 및 목적</div>
      <div class="opt-toggle active" data-key="summary">핵심 요약</div>
      <div class="opt-toggle active" data-key="decisions">결정사항 & 근거</div>
      <div class="opt-toggle active" data-key="openIssues">미결 사항</div>
      <div class="opt-toggle active" data-key="todo">TO-DO LIST</div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-label">04. API 설정</div>
    <div class="api-section">
      <div class="field" style="margin-bottom:10px;">
        <label>Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="AIzaSy...">
      </div>
      <div class="field">
        <label>Model</label>
        <select id="modelSelect">
          <option value="gemini-2.0-flash">gemini-2.0-flash (권장)</option>
          <option value="gemini-1.5-pro">gemini-1.5-pro</option>
        </select>
      </div>
    </div>
  </div>

  <button class="btn-generate" id="genBtn" onclick="runAnalysis()">회의록 분석 및 생성</button>
  <div class="progress-wrap" id="progWrap"><div class="progress-fill" id="progBar"></div></div>

  <div class="result-wrap" id="resultWrap"></div>
</div>

<script>
// 초기 세팅
document.getElementById('mDate').value = new Date().toISOString().split('T')[0];
const optToggles = document.querySelectorAll('.opt-toggle');
optToggles.forEach(t => t.onclick = () => t.classList.toggle('active'));

function getPrompt() {
  return `당신은 대한민국 대기업 비서실 수준의 회의록 작성 전문가입니다. 
다음 녹취록을 분석하여 반드시 아래 JSON 구조로 응답하십시오. (마크다운 없이 순수 JSON만)

{
  "metadata": {
    "title": "회의 제목",
    "background": "회의가 소집된 구체적인 배경과 논의의 목적 (3문장 내외)"
  },
  "summary": "전체 논의를 관통하는 핵심 요약 (함쇼체)",
  "decisions": [
    {
      "item": "결정사항",
      "rationale": "해당 결정을 내린 논리적 근거 및 데이터 포인트"
    }
  ],
  "openIssues": [
    {
      "issue": "미결정된 안건 또는 쟁점",
      "nextStep": "향후 논의 계획 및 해결 방안"
    }
  ],
  "todo": [
    {"task": "과제명", "owner": "담당자", "priority": "high|medium|low"}
  ]
}`;
}

async function runAnalysis() {
  const text = document.getElementById('transcriptText').value;
  const key = document.getElementById('apiKey').value;
  if(!text || !key) return alert("내용과 API 키를 확인하세요.");

  const btn = document.getElementById('genBtn');
  const bar = document.getElementById('progBar');
  const wrap = document.getElementById('progWrap');
  
  btn.disabled = true; wrap.style.display = 'block'; bar.style.width = '30%';

  try {
    const model = document.getElementById('modelSelect').value;
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        system_instruction: { parts: [{ text: getPrompt() }] },
        contents: [{ role: 'user', parts: [{ text: `회의명: ${document.getElementById('meetingTitle').value}\n참석자: ${document.getElementById('attendees').value}\n녹취록:\n${text}` }] }],
        generationConfig: { response_mime_type: "application/json" }
      })
    });

    bar.style.width = '70%';
    const data = await res.json();
    const result = JSON.parse(data.candidates[0].content.parts[0].text);
    bar.style.width = '100%';
    
    render(result);
  } catch(e) {
    alert("분석 실패: " + e.message);
  } finally {
    btn.disabled = false; wrap.style.display = 'none';
  }
}

function render(d) {
  const resultWrap = document.getElementById('resultWrap');
  resultWrap.style.display = 'block';
  
  let html = `
    <div class="doc">
      <div class="doc-head">
        <div class="doc-title">${d.metadata.title}</div>
        <table class="doc-meta-table">
          <tr><td>일시</td><td>${document.getElementById('mDate').value}</td></tr>
          <tr><td>주관</td><td>${document.getElementById('dept').value || '-'}</td></tr>
          <tr><td>참석자</td><td>${document.getElementById('attendees').value || '-'}</td></tr>
        </table>
      </div>

      <div class="doc-sec">
        <div class="doc-sec-title"><span>01</span> 회의 배경 및 목적</div>
        <div style="font-size:13px; color:var(--slate); line-height:1.7;">${d.metadata.background}</div>
      </div>

      <div class="doc-sec">
        <div class="doc-sec-title"><span>02</span> 핵심 요약</div>
        <div class="summary-text">${d.summary}</div>
      </div>

      <div class="doc-sec">
        <div class="doc-sec-title"><span>03</span> 결정사항 및 논리적 근거</div>
        ${d.decisions.map(dec => `
          <div class="decision-box">
            <div class="rationale-tag">RATIONALE</div>
            <div style="font-weight:600; margin-bottom:8px;">${dec.item}</div>
            <div style="font-size:12px; color:var(--ink-2);">${dec.rationale}</div>
          </div>
        `).join('')}
      </div>

      <div class="doc-sec">
        <div class="doc-sec-title"><span>04</span> 미결 안건 및 차기 과제</div>
        ${d.openIssues.map(oi => `
          <div class="issue-item">
            <strong>쟁점: ${oi.issue}</strong><br/>
            <span style="font-size:11px; color:var(--ink-3);">Next Step: ${oi.nextStep}</span>
          </div>
        `).join('')}
      </div>

      <div class="doc-sec">
        <div class="doc-sec-title"><span>05</span> TO-DO LIST</div>
        <table class="todo-table">
          <thead><tr><th>담당자</th><th>실행 과제</th><th>우선순위</th></tr></thead>
          <tbody>
            ${d.todo.map(t => `
              <tr>
                <td><span class="owner-tag">${t.owner}</span></td>
                <td>${t.task}</td>
                <td><span style="color:${t.priority === 'high' ? 'var(--red)' : 'var(--ink-3)'}">${t.priority.toUpperCase()}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>

      <div class="doc-foot">
        <div>Generated by WOOK'S AI v2.5</div>
        <div>
          <button class="btn-doc" onclick="window.print()">인쇄 / PDF 저장</button>
        </div>
      </div>
    </div>
  `;
  resultWrap.innerHTML = html;
  resultWrap.scrollIntoView({behavior:'smooth'});
}
</script>

</body>
</html>

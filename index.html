<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOOK'S 회의록 v2.5.1 Professional</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --paper:#F7F5F0;--paper-2:#EFECE5;--paper-3:#E8E4DA;
  --ink:#2C2C2A;--ink-2:#5A5753;--ink-3:#8A8780;
  --line:#D8D4C8;--line-2:#C8C3B5;
  --red:#9B3A2A;--red-bg:#F5EDE9;
  --moss:#4A6741;--moss-bg:#EBF0E8;
  --sand:#8B7355;--sand-bg:#F2EDE3;
  --slate:#3D5A6B;--slate-bg:#E8EFF3;
  --serif:'Noto Serif KR',serif;--sans:'Noto Sans KR',sans-serif;--mono:'Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.7;}
.header{background:var(--ink);padding:0 2.5rem;height:56px;display:flex;align-items:center;gap:16px;}
.header-logo{font-family:var(--serif);font-size:15px;font-weight:600;color:var(--paper);letter-spacing:2px;}
.header-div{width:1px;height:18px;background:rgba(255,255,255,0.2);}
.header-sub{font-size:12px;color:rgba(255,255,255,0.4);font-weight:300;letter-spacing:0.5px;}
.wrap{max-width:860px;margin:0 auto;padding:3rem 2rem 4rem;}
.sec{border-bottom:1px solid var(--line);padding:2.5rem 0;}
.sec:first-child{padding-top:0;}
.sec-label{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink-3);margin-bottom:1.5rem;display:flex;align-items:center;gap:10px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--line);}
textarea{width:100%;min-height:150px;border:1px solid var(--line);padding:1rem;font-size:13px;resize:vertical;outline:none;background:white;}
.meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;}
.field label{display:block;font-size:10px;color:var(--ink-3);margin-bottom:5px;text-transform:uppercase;}
.field input, .field select{width:100%;padding:8px;border:1px solid var(--line);outline:none;}
.api-section{background:white;border:1px solid var(--line);padding:1.5rem;}
.btn-generate{width:100%;padding:16px;background:var(--ink);color:var(--paper);border:none;font-family:var(--serif);font-size:16px;cursor:pointer;margin-top:2rem;transition:0.2s;}
.btn-generate:hover{background:#3D3D3B;}
.progress-wrap{display:none;margin-top:1.5rem;height:2px;background:var(--line);position:relative;}
.progress-fill{height:100%;background:var(--ink);width:0%;transition:width 0.3s;}

/* RESULT STYLES */
.result-wrap{display:none;margin-top:3rem;}
.doc{background:white;border:1px solid var(--line);box-shadow:0 10px 30px rgba(0,0,0,0.05);}
.doc-head{padding:3rem;border-bottom:2px solid var(--ink);}
.doc-title{font-family:var(--serif);font-size:24px;margin-bottom:1rem;color:var(--ink);}
.doc-meta-table{width:100%;border-collapse:collapse;font-size:12px;}
.doc-meta-table td{padding:8px 0;border-bottom:1px solid var(--paper-2);}
.doc-meta-table td:first-child{width:120px;color:var(--ink-3);text-transform:uppercase;letter-spacing:1px;font-weight:500;}
.doc-sec{padding:2.5rem 3rem;border-bottom:1px solid var(--line);}
.doc-sec:last-child{border-bottom:none;}
.doc-sec-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-3);margin-bottom:1.5rem;display:flex;align-items:center;}
.doc-sec-title span{font-family:var(--mono);margin-right:10px;color:var(--line-2);}
.doc-sec-title::after{content:'';flex:1;height:1px;background:var(--line);margin-left:10px;}
.summary-text{font-size:14px;line-height:1.8;padding-left:1rem;border-left:3px solid var(--ink);color:var(--ink);}

/* 핵심 결정사항 스타일 (03번 섹션) */
.decision-container{display:flex;flex-direction:column;gap:12px;}
.decision-box{background:var(--sand-bg);padding:1.5rem;border-left:4px solid var(--sand);position:relative;}
.rationale-tag{display:inline-block;font-family:var(--mono);font-size:9px;background:var(--sand);color:white;padding:1px 6px;margin-bottom:8px;border-radius:2px;}
.decision-item-text{font-weight:600;font-size:14px;margin-bottom:8px;color:var(--ink);}
.rationale-text{font-size:12.5px;color:var(--ink-2);line-height:1.6;font-style:italic;}

/* 미결 안건 스타일 (04번 섹션) */
.issue-list{display:flex;flex-direction:column;gap:8px;}
.issue-card{background:var(--paper-2);padding:1.2rem;border:1px solid var(--line);display:flex;flex-direction:column;gap:6px;}
.issue-title{font-weight:600;font-size:13px;color:var(--red);display:flex;align-items:center;gap:8px;}
.issue-title::before{content:'●';font-size:8px;}
.issue-next{font-size:12px;color:var(--ink-2);padding-left:15px;border-left:1px solid var(--line-2);margin-left:4px;}

.todo-table{width:100%;border-collapse:collapse;font-size:12px;}
.todo-table th{text-align:left;padding:10px;border-bottom:1px solid var(--ink);color:var(--ink-3);font-weight:500;}
.todo-table td{padding:12px 10px;border-bottom:1px solid var(--line);}
.owner-tag{background:var(--slate-bg);color:var(--slate);padding:3px 8px;font-size:11px;border-radius:2px;}
.pri-tag{font-weight:600;font-family:var(--mono);text-transform:uppercase;}

.doc-foot{padding:1.5rem 3rem;background:var(--paper-2);display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--ink-3);}
.btn-doc{padding:8px 20px;border:1px solid var(--line-2);background:white;cursor:pointer;font-size:12px;transition:0.2s;}
.btn-doc:hover{border-color:var(--ink);color:var(--ink);}

@media print{.header, .sec, .btn-generate, .progress-wrap{display:none!important;}.wrap{padding:0;max-width:100%;}.doc{border:none;box-shadow:none;}}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">WOOK'S 회의록</div>
  <div class="header-div"></div>
  <div class="header-sub">Professional Analysis v2.5.1</div>
</div>

<div class="wrap">
  <div class="sec">
    <div class="sec-label">01. 회의 내용 (녹취록)</div>
    <textarea id="transcriptText" placeholder="이곳에 회의 녹취록 또는 요약할 내용을 입력하세요..."></textarea>
  </div>

  <div class="sec">
    <div class="sec-label">02. 회의 정보 설정</div>
    <div class="meta-grid">
      <div class="field"><label>회의명</label><input type="text" id="meetingTitle" placeholder="예: 상반기 전략 회의"></div>
      <div class="field"><label>참석자</label><input type="text" id="attendees" placeholder="홍길동 팀장, 김철수 과장..."></div>
      <div class="field"><label>주관부서</label><input type="text" id="dept" placeholder="경영기획팀"></div>
      <div class="field"><label>날짜</label><input type="date" id="mDate"></div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-label">03. 분석 엔진 설정</div>
    <div class="api-section">
      <div class="field" style="margin-bottom:12px;">
        <label>Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="AIzaSy로 시작하는 키를 입력하세요">
      </div>
      <div class="field">
        <label>AI Model</label>
        <select id="modelSelect">
          <option value="gemini-2.0-flash">Gemini 2.0 Flash (속도 최적화)</option>
          <option value="gemini-1.5-pro">Gemini 1.5 Pro (정밀 분석)</option>
        </select>
      </div>
    </div>
  </div>

  <button class="btn-generate" id="genBtn" onclick="runAnalysis()">논리 분석 및 회의록 생성</button>
  <div class="progress-wrap" id="progWrap"><div class="progress-fill" id="progBar"></div></div>

  <div class="result-wrap" id="resultWrap"></div>
</div>

<script>
document.getElementById('mDate').value = new Date().toISOString().split('T')[0];

function getPrompt() {
  return `당신은 대기업 전략실의 전문 비즈니스 분석가입니다. 
회의 내용을 분석하여 다음의 JSON 형식으로만 응답하십시오. (마크다운 기호 금지)

{
  "metadata": {
    "title": "회의 제목",
    "background": "회의가 개최된 배경 및 구체적인 목적 (데이터 및 상황 중심)"
  },
  "summary": "전체 논의를 관통하는 핵심 요약",
  "decisions": [
    {
      "item": "결정된 사항",
      "rationale": "이 결정을 내리게 된 논리적 근거 및 기대 효과"
    }
  ],
  "openIssues": [
    {
      "issue": "합의되지 않은 안건 또는 잠재적 리스크",
      "nextStep": "향후 대응 계획 또는 차기 논의 필요 사항"
    }
  ],
  "todo": [
    {"task": "구체적 실행 과제", "owner": "담당자", "priority": "high|medium|low"}
  ]
}`;
}

async function runAnalysis() {
  const text = document.getElementById('transcriptText').value;
  const key = document.getElementById('apiKey').value;
  if(!text || !key) return alert("회의 내용과 API Key를 모두 입력해주세요.");

  const btn = document.getElementById('genBtn');
  const bar = document.getElementById('progBar');
  const wrap = document.getElementById('progWrap');
  
  btn.disabled = true; wrap.style.display = 'block'; bar.style.width = '30%';

  try {
    const model = document.getElementById('modelSelect').value;
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        system_instruction: { parts: [{ text: getPrompt() }] },
        contents: [{ role: 'user', parts: [{ text: `회의 정보: ${document.getElementById('meetingTitle').value}\n참석자: ${document.getElementById('attendees').value}\n\n데이터:\n${text}` }] }],
        generationConfig: { response_mime_type: "application/json" }
      })
    });

    bar.style.width = '80%';
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    
    const result = JSON.parse(data.candidates[0].content.parts[0].text);
    bar.style.width = '100%';
    
    render(result);
  } catch(e) {
    alert("분석 중 오류 발생: " + e.message);
    console.error(e);
  } finally {
    btn.disabled = false; wrap.style.display = 'none';
  }
}

function render(d) {
  const resultWrap = document.getElementById('resultWrap');
  resultWrap.style.display = 'block';
  
  let html = `
    <div class="doc">
      <div class="doc-head">
        <div class="doc-title">${d.metadata.title || document.getElementById('meetingTitle').value || '회의록'}</div>
        <table class="doc-meta-table">
          <tr><td>일시</td><td>${document.getElementById('mDate').value}</td></tr>
          <tr><td>참석자</td><td>${document.getElementById('attendees').value || '-'}</td></tr>
          <tr><td>주관부서</td><td>${document.getElementById('dept').value || '-'}</td></tr>
        </table>
      </div>

      <div class="doc-sec">
        <div class="doc-sec-title"><span>01</span> 회의 배경 및 목적</div>
        <div style="font-size:13.5px; color:var(--ink-2); line-height:1.7;">${d.metadata.background || '배경 정보 없음'}</div>
      </div>

      <div class="doc-sec">
        <div class="doc-sec-title"><span>02</span> 핵심 요약</div>
        <div class="summary-text">${d.summary || '요약 정보 없음'}</div>
      </div>

      <div class="doc-sec">
        <div class="doc-sec-title"><span>03</span> 주요 결정사항 및 논리적 근거</div>
        <div class="decision-container">
          ${d.decisions && d.decisions.length > 0 ? d.decisions.map(dec => `
            <div class="decision-box">
              <div class="rationale-tag">RATIONALE</div>
              <div class="decision-item-text">${dec.item}</div>
              <div class="rationale-text">근거: ${dec.rationale}</div>
            </div>
          `).join('') : '<div style="color:var(--ink-3);">결정된 사항이 없습니다.</div>'}
        </div>
      </div>

      <div class="doc-sec">
        <div class="doc-sec-title"><span>04</span> 미결 안건 및 차기 과제</div>
        <div class="issue-list">
          ${d.openIssues && d.openIssues.length > 0 ? d.openIssues.map(oi => `
            <div class="issue-card">
              <div class="issue-title">${oi.issue}</div>
              <div class="issue-next"><strong>Next Step:</strong> ${oi.nextStep}</div>
            </div>
          `).join('') : '<div style="color:var(--ink-3);">미결 사항이 없습니다.</div>'}
        </div>
      </div>

      <div class="doc-sec">
        <div class="doc-sec-title"><span>05</span> TO-DO LIST</div>
        <table class="todo-table">
          <thead><tr><th>담당자</th><th>실행 과제</th><th>우선순위</th></tr></thead>
          <tbody>
            ${d.todo && d.todo.length > 0 ? d.todo.map(t => `
              <tr>
                <td><span class="owner-tag">${t.owner || '미정'}</span></td>
                <td style="font-weight:500;">${t.task}</td>
                <td class="pri-tag" style="color:${t.priority === 'high' ? 'var(--red)' : 'var(--ink-3)'}">${t.priority}</td>
              </tr>
            `).join('') : '<tr><td colspan="3" style="text-align:center; color:var(--ink-3);">과제가 없습니다.</td></tr>'}
          </tbody>
        </table>
      </div>

      <div class="doc-foot">
        <div>Generated by WOOK'S AI | Professional Analysis Tool</div>
        <button class="btn-doc" onclick="window.print()">문서 인쇄 / PDF 저장</button>
      </div>
    </div>
  `;
  resultWrap.innerHTML = html;
  resultWrap.scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
